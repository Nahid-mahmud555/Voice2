<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice to Text - Manual Stop</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 550px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        h2 { color: var(--accent); margin-bottom: 10px; }
        #status { font-size: 14px; color: #94a3b8; margin-bottom: 20px; font-weight: bold; }
        #display-area { background: #0f172a; border: 2px solid #334155; border-radius: 15px; padding: 20px; min-height: 150px; text-align: left; font-size: 1.2rem; line-height: 1.6; margin-bottom: 25px; color: #38bdf8; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; width: 100%; max-width: 280px; }
        #start-btn { background: var(--accent); color: white; }
        #stop-btn { background: #ef4444; color: white; display: none; }
        #clear-btn { background: #475569; color: white; margin-top: 10px; }
        button:hover { transform: scale(1.05); opacity: 0.9; }
        .pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Voice Converter (Pro)</h2>
    <div id="status">সিস্টেম প্রস্তুত</div>
    <div id="display-area">আপনার কথা এখানে টেক্সট হয়ে আসবে...</div>
    
    <div class="btn-group">
        <button id="start-btn">কথা বলা শুরু করুন</button>
        <button id="stop-btn" class="pulse">কথা শেষ (টেক্সট দেখুন)</button>
        <button id="clear-btn">সব মুছে ফেলুন</button>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const clearBtn = document.getElementById('clear-btn');
    const displayArea = document.getElementById('display-area');
    const statusText = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        
        recognition.continuous = true; // লম্বা সময় ধরে শুনবে
        recognition.interimResults = false; // মাঝপথে কিছু দেখাবে না
        recognition.lang = 'bn-BD';

        let finalTalk = "";

        recognition.onstart = () => {
            statusText.innerText = "🔴 রেকর্ডিং চলছে... আপনি বলতে থাকুন।";
            startBtn.style.display = "none";
            stopBtn.style.display = "inline-block";
            displayArea.innerText = "আমি শুনছি... বলা শেষ হলে নিচের বাটনে চাপ দিন।";
        };

        recognition.onresult = (event) => {
            // যতগুলো বাক্য বলছো সব জমা হবে
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTalk += event.results[i][0].transcript + " ";
                }
            }
        };

        recognition.onerror = (event) => {
            if(event.error === 'no-speech') return;
            statusText.innerText = "Error: " + event.error;
        };

        recognition.onend = () => {
            // যদি ইউজার নিজে স্টপ না করে, তবে অটো অফ হওয়া ঠেকাবে
            if (stopBtn.style.display === "inline-block") {
                recognition.start();
            }
        };

        startBtn.addEventListener('click', () => {
            finalTalk = ""; // নতুন করে শুরু
            recognition.start();
        });

        stopBtn.addEventListener('click', () => {
            stopBtn.style.display = "none";
            startBtn.style.display = "inline-block";
            statusText.innerText = "প্রসেসিং শেষ!";
            
            // এবার জমানো সব কথা একবারে দেখাবে
            displayArea.innerText = finalTalk || "আপনি বোধহয় কিছু বলেননি মামা!";
            recognition.stop();
        });

        clearBtn.addEventListener('click', () => {
            finalTalk = "";
            displayArea.innerText = "আপনার কথা এখানে টেক্সট হয়ে আসবে...";
            statusText.innerText = "সিস্টেম প্রস্তুত";
            recognition.stop();
            stopBtn.style.display = "none";
            startBtn.style.display = "inline-block";
        });

    } else {
        alert("মামা, Chrome ব্রাউজার ব্যবহার করো!");
    }
</script>

</body>
</html>
