<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Voice AI Nexus | Gemini Assistant</title>
<!-- Google Fonts + Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 40%, #0b0e1a, #020308);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow-x: hidden;
  }

  /* 3D Animated Canvas Background */
  #orb-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.7;
  }

  /* Main 3D Glass Card with floating animation */
  .neo-card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 780px;
    background: rgba(12, 18, 32, 0.55);
    backdrop-filter: blur(16px);
    border-radius: 2.8rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
    animation: cardFloat 5s infinite ease-in-out;
  }

  .neo-card:hover {
    transform: translateY(-6px) scale(1.005);
    box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
  }

  @keyframes cardFloat {
    0% { transform: translateY(0px) rotateX(0deg); }
    50% { transform: translateY(-7px) rotateX(0.5deg); }
    100% { transform: translateY(0px) rotateX(0deg); }
  }

  .card-inner {
    padding: 2rem 1.8rem 2.2rem;
  }

  /* Header with 3D text */
  .header-flex {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1.8rem;
  }
  h2 {
    font-size: 1.9rem;
    font-weight: 800;
    background: linear-gradient(125deg, #FFFFFF, #B7A9FF, #6E8AFF);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  h2 i {
    background: none;
    color: #b77eff;
    text-shadow: 0 0 12px #a15eff;
  }
  .lang-badge {
    background: rgba(10, 20, 40, 0.65);
    backdrop-filter: blur(8px);
    border-radius: 60px;
    padding: 5px 12px;
    border: 1px solid rgba(255,255,210,0.3);
  }
  select {
    background: rgba(0, 0, 0, 0.65);
    color: #f0f3ff;
    border: 1px solid #6d80c0;
    border-radius: 2rem;
    padding: 8px 18px;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
    transition: 0.2s;
    font-family: 'Inter', monospace;
  }
  select:hover {
    border-color: #bb99ff;
    box-shadow: 0 0 14px rgba(140, 100, 255, 0.5);
  }

  /* 3D Button Grid */
  .button-fleet {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 28px 0 18px;
  }
  .glass-btn {
    background: rgba(25, 35, 55, 0.75);
    backdrop-filter: blur(8px);
    border: none;
    padding: 11px 22px;
    border-radius: 60px;
    font-weight: 600;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    color: #f5f9ff;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
    border: 0.5px solid rgba(255,255,210,0.25);
  }
  .glass-btn i {
    font-size: 1rem;
  }
  .glass-btn:hover {
    transform: translateY(-3px) scale(1.02);
    background: rgba(55, 75, 120, 0.9);
    box-shadow: 0 14px 24px rgba(0, 0, 0, 0.4);
    border-color: rgba(200, 170, 255, 0.7);
  }
  .start { background: linear-gradient(105deg, #1b6e48, #0e865a); box-shadow: 0 5px 12px #0a5a3b70; }
  .stop { background: linear-gradient(105deg, #aa3838, #c94444); }
  .ask { background: linear-gradient(105deg, #7733aa, #9b4dff); box-shadow: 0 5px 14px #5a2a9e50; }
  .clear { background: linear-gradient(105deg, #c97e2a, #e09d32); }
  .copy { background: linear-gradient(105deg, #1f6090, #2f7eb3); }
  .delete { background: linear-gradient(105deg, #23232e, #1a1a2a); }

  /* Output Panels 3D depth */
  .speech-panel, .ai-panel {
    margin: 1rem 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    border-radius: 1.6rem;
    padding: 1.2rem 1.4rem;
    border: 1px solid rgba(255, 255, 255, 0.15);
    transition: all 0.2s;
  }
  .panel-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #b7cbff;
    margin-bottom: 10px;
  }
  #output, #aiOutput {
    font-size: 1.05rem;
    line-height: 1.45;
    color: #ffffffec;
    font-weight: 500;
    word-break: break-word;
    min-height: 70px;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    font-family: 'Inter', monospace;
  }
  #aiOutput {
    color: #dcddff;
  }

  /* History with 3D scroll */
  .history-area {
    margin-top: 1.2rem;
  }
  .history-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .history-title h3 {
    font-size: 1.1rem;
    font-weight: 600;
    background: linear-gradient(135deg, #cddbff, #9fb0ff);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  #history {
    max-height: 130px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 1.4rem;
    padding: 0.6rem 0.9rem;
    backdrop-filter: blur(4px);
    scrollbar-width: thin;
    border: 0.5px solid rgba(255,255,200,0.2);
  }
  #history p {
    background: rgba(255,255,255,0.07);
    margin: 8px 0;
    padding: 8px 14px;
    border-radius: 34px;
    font-size: 0.85rem;
    color: #f0f3ff;
    border-left: 3px solid #8f72ff;
    transition: 0.1s;
  }
  #history p:hover {
    transform: translateX(5px);
    background: rgba(130, 110, 230, 0.3);
    border-left-color: #ffbc6e;
  }

  /* Listening Pulse */
  .listening-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: 10px;
  }
  .pulse-led {
    width: 10px;
    height: 10px;
    background: #2eff9e;
    border-radius: 50%;
    box-shadow: 0 0 8px #3effaa;
    animation: pulseAnim 1.2s infinite;
  }
  @keyframes pulseAnim {
    0% { opacity: 0.4; transform: scale(0.8);}
    100% { opacity: 1; transform: scale(1.3); background: #b5ffd0;}
  }

  /* custom scroll */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #11151f; border-radius: 10px; }
  ::-webkit-scrollbar-thumb { background: #6f5fae; border-radius: 10px; }

  @media (max-width: 560px) {
    .card-inner { padding: 1.4rem; }
    .glass-btn { padding: 8px 14px; font-size: 0.8rem; }
    h2 { font-size: 1.5rem; }
    #output, #aiOutput { font-size: 0.9rem; }
  }
  footer {
    text-align: center;
    font-size: 0.65rem;
    margin-top: 1.5rem;
    opacity: 0.55;
    color: #aab8e6;
  }
</style>
</head>
<body>

<canvas id="orb-canvas"></canvas>

<div class="neo-card">
  <div class="card-inner">
    <div class="header-flex">
      <h2><i class="fas fa-microphone-alt"></i> Voice + AI Nexus</h2>
      <div class="lang-badge">
        <select id="language">
          <option value="en-US">🌐 English (US)</option>
          <option value="bn-BD">🇧🇩 বাংলা (Bangla)</option>
          <option value="hi-IN">🇮🇳 हिंदी</option>
        </select>
      </div>
    </div>

    <div class="button-fleet">
      <button class="glass-btn start" id="startBtn"><i class="fas fa-play"></i> Start</button>
      <button class="glass-btn stop" id="stopBtn"><i class="fas fa-stop"></i> Stop</button>
      <button class="glass-btn ask" id="askBtn"><i class="fas fa-robot"></i> Ask AI</button>
      <button class="glass-btn clear" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
      <button class="glass-btn copy" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
      <button class="glass-btn delete" id="deleteBtn"><i class="fas fa-trash-alt"></i> Delete</button>
    </div>

    <!-- Voice Output -->
    <div class="speech-panel">
      <div class="panel-label">
        <i class="fas fa-waveform"></i> 
        <span>🎙️ VOICE TRANSCRIPT</span>
        <span id="liveIndicator" class="listening-badge"></span>
      </div>
      <div id="output">Voice text here...</div>
    </div>

    <!-- AI Output -->
    <div class="ai-panel">
      <div class="panel-label">
        <i class="fas fa-brain"></i> 
        <span>🤖 GEMINI AI ANSWER</span>
      </div>
      <div id="aiOutput">AI response will appear here...</div>
    </div>

    <div class="history-area">
      <div class="history-title">
        <h3><i class="fas fa-history"></i> 📝 History</h3>
        <i class="fas fa-database" style="font-size:12px; opacity:0.6;"></i>
      </div>
      <div id="history"></div>
    </div>
    <footer>⚡ 3D Immersive | Gemini AI | Real-time Speech</footer>
  </div>
</div>

<script>
  // ---------- 3D ANIMATED BACKGROUND: Floating Orbs & Particles ----------
  const canvas = document.getElementById('orb-canvas');
  let ctx = canvas.getContext('2d');
  let w, h;
  let particles = [];
  let timeFlow = 0;

  function resizeCanvas3D() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
  }

  class FluidParticle {
    constructor() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.z = Math.random() * 180;
      this.rad = 1.5 + Math.random() * 3;
      this.vx = (Math.random() - 0.5) * 0.35;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.hue = 210 + Math.random() * 70;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < -30) this.x = w + 30;
      if (this.x > w + 30) this.x = -30;
      if (this.y < -30) this.y = h + 30;
      if (this.y > h + 30) this.y = -30;
      this.z += 0.25;
      if (this.z > 220) this.z = 10;
    }
    draw() {
      const perspective = 380 / (380 + this.z);
      const x2 = (this.x - w/2) * perspective + w/2;
      const y2 = (this.y - h/2) * perspective + h/2;
      const r2 = this.rad * perspective;
      ctx.beginPath();
      ctx.arc(x2, y2, r2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 75%, 65%, 0.7)`;
      ctx.shadowBlur = 10;
      ctx.shadowColor = `hsla(${this.hue}, 85%, 65%, 0.6)`;
      ctx.fill();
    }
  }

  function initParticles(count) {
    particles = [];
    for (let i = 0; i < count; i++) particles.push(new FluidParticle());
  }

  function drawBackground3D() {
    if (!ctx) return;
    ctx.clearRect(0, 0, w, h);
    // deep space gradient
    const grad = ctx.createLinearGradient(0, 0, w*0.8, h);
    grad.addColorStop(0, '#03050c');
    grad.addColorStop(1, '#0a0e1c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    
    // glowing waves
    ctx.save();
    ctx.shadowBlur = 0;
    for (let i = 0; i < 2; i++) {
      ctx.beginPath();
      const offset = timeFlow * 0.0025 + i * 1.8;
      for (let x = 0; x < w; x += 28) {
        let y = h/2 + Math.sin(x * 0.007 + offset) * 38 + Math.cos(x * 0.012 + offset*0.9) * 22;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(100, 150, 255, ${0.1 + i*0.07})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.restore();
    
    for (let p of particles) {
      p.update();
      p.draw();
    }
    // floating orbs
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      const angle = timeFlow * 0.0012 + i;
      const orbX = w/2 + Math.sin(angle) * 110;
      const orbY = h/2 + Math.cos(angle * 0.8) * 70;
      const radGrad = ctx.createRadialGradient(orbX, orbY, 3, orbX, orbY, 32);
      radGrad.addColorStop(0, 'rgba(120, 90, 255, 0.2)');
      radGrad.addColorStop(1, 'rgba(40, 20, 70, 0)');
      ctx.fillStyle = radGrad;
      ctx.arc(orbX, orbY, 35, 0, Math.PI*2);
      ctx.fill();
    }
    timeFlow++;
    requestAnimationFrame(drawBackground3D);
  }

  window.addEventListener('resize', () => {
    resizeCanvas3D();
    initParticles(140);
  });
  resizeCanvas3D();
  initParticles(140);
  drawBackground3D();

  // ---------- ORIGINAL LOGIC (PRESERVED FULLY) ----------
  let recognition;
  let finalText = "";
  let lastText = "";
  let isListening = false;

  const outputDiv = document.getElementById("output");
  const aiOutputDiv = document.getElementById("aiOutput");
  const languageSelect = document.getElementById("language");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const askBtn = document.getElementById("askBtn");
  const clearBtn = document.getElementById("clearBtn");
  const copyBtn = document.getElementById("copyBtn");
  const deleteBtn = document.getElementById("deleteBtn");
  const historyDiv = document.getElementById("history");
  const liveIndicator = document.getElementById("liveIndicator");

  function updateListeningUI(active) {
    if (active) {
      liveIndicator.innerHTML = '<span class="pulse-led"></span><span style="margin-left:6px; font-size:11px;">Listening</span>';
    } else {
      liveIndicator.innerHTML = '';
    }
  }

  // save history exactly as original
  function saveHistory() {
    const text = outputDiv.innerText;
    if (text.trim() === "" || text === "Voice text here...") return;
    const p = document.createElement("p");
    p.innerText = "• " + text;
    historyDiv.prepend(p);
  }

  function clearText() {
    finalText = "";
    lastText = "";
    outputDiv.innerText = "";
  }

  function copyText() {
    const textToCopy = outputDiv.innerText;
    if (!textToCopy || textToCopy === "Voice text here...") {
      const toast = document.createElement('div');
      toast.innerText = "📭 Nothing to copy";
      toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1e1f2c; padding:6px 18px; border-radius:40px; color:white; z-index:999; backdrop-filter:blur(12px);";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1200);
      return;
    }
    navigator.clipboard.writeText(textToCopy);
    const successMsg = document.createElement('div');
    successMsg.innerText = "✅ Copied!";
    successMsg.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2c2f48; color:#bbddff; padding:7px 20px; border-radius:40px; z-index:999; backdrop-filter:blur(10px); font-weight:500;";
    document.body.appendChild(successMsg);
    setTimeout(() => successMsg.remove(), 1300);
  }

  function deleteHistory() {
    historyDiv.innerHTML = "";
  }

  // Voice Start (identical original logic with proper event flow)
  function startListening() {
    if (isListening) return;
    const lang = languageSelect.value;
    try {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = lang;
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.start();
      isListening = true;
      updateListeningUI(true);

      recognition.onresult = function(event) {
        let currentText = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          currentText += event.results[i][0].transcript;
        }
        if (currentText !== lastText) {
          let newPart = currentText.replace(lastText, "");
          finalText += newPart + " ";
          lastText = currentText;
        }
        outputDiv.innerText = finalText;
      };

      recognition.onend = function() {
        if (isListening) {
          recognition.start();
        }
      };

      recognition.onerror = function(e) {
        console.warn(e);
        if (e.error === 'not-allowed') {
          outputDiv.innerText = "🎤 Microphone access denied. Allow permissions.";
          stopListening();
        }
      };
    } catch(e) {
      outputDiv.innerText = "⚠️ Browser not supported. Use Chrome/Edge.";
    }
  }

  function stopListening() {
    isListening = false;
    if (recognition) recognition.stop();
    saveHistory();
    lastText = "";
    updateListeningUI(false);
  }

  // 🤖 GEMINI AI (original API logic, same endpoint with YOUR_API_KEY placeholder)
  async function askAI() {
    const text = outputDiv.innerText;
    if (text.trim() === "" || text === "Voice text here...") {
      alert("Age kotha bolo 😒");
      return;
    }

    aiOutputDiv.innerText = "🤖 Thinking...";

    try {
      // IMPORTANT: Use the same API key structure as original. Replace YOUR_API_KEY with actual key to work.
      // Keeping exactly as original: endpoint with placeholder "YOUR_API_KEY"
      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyDpYt4mRk1WDk8PpxKoL4hcJYqo6FjkITA",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: text }] }]
          })
        }
      );

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      const aiText = data.candidates[0].content.parts[0].text;
      aiOutputDiv.innerText = aiText;
    } catch(e) {
      aiOutputDiv.innerText = "Error 😢";
      console.log(e);
    }
  }

  // attach events to buttons exactly mapping original functionality
  startBtn.onclick = startListening;
  stopBtn.onclick = stopListening;
  askBtn.onclick = askAI;
  clearBtn.onclick = clearText;
  copyBtn.onclick = copyText;
  deleteBtn.onclick = deleteHistory;

  // Language change: if listening, original didn't auto-restart but we preserve behavior: next start uses new language. no auto restart.
  // keep smooth.
  
  // Prefill initial output as original
  outputDiv.innerText = "Voice text here...";
  aiOutputDiv.innerText = "AI response will appear here...";
  finalText = "";
  lastText = "";
  
  // Edge: if user clicks stop, saves history exactly like original.
  // also ensure that if empty text, saveHistory won't push empty.
  window.addEventListener('beforeunload', () => {
    if (recognition && isListening) {
      try { recognition.stop(); } catch(e) {}
    }
  });
</script>
</body>
</html>
