<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Insight Listener | AI Startup Ideas</title>
<!-- Google Fonts + Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 40%, #0a0e1a, #020408);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow-x: hidden;
  }

  /* 3D Animated Canvas Background */
  #cosmic-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.65;
  }

  /* Main 3D Glass Card with floating animation */
  .insight-card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 850px;
    background: rgba(12, 18, 32, 0.55);
    backdrop-filter: blur(16px);
    border-radius: 2.8rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
    animation: cardFloat 5s infinite ease-in-out;
  }

  .insight-card:hover {
    transform: translateY(-6px) scale(1.003);
    box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
  }

  @keyframes cardFloat {
    0% { transform: translateY(0px) rotateX(0deg); }
    50% { transform: translateY(-7px) rotateX(0.5deg); }
    100% { transform: translateY(0px) rotateX(0deg); }
  }

  .card-content {
    padding: 2rem 2rem 2.2rem;
  }

  /* Header with 3D neon */
  .hero-section {
    text-align: center;
    margin-bottom: 2rem;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(125deg, #FFFFFF, #B7A9FF, #6E8AFF, #4cff9e);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0.5rem;
  }
  h1 i {
    background: none;
    color: #ffd966;
    text-shadow: 0 0 15px #ffaa33;
  }
  .tagline {
    color: #b9cbff;
    font-size: 0.95rem;
    opacity: 0.9;
    letter-spacing: 0.5px;
  }

  /* 3D Input Area */
  .input-zone {
    margin: 1.8rem 0 1.2rem;
  }
  .input-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-weight: 500;
    color: #cddeff;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }
  textarea {
    width: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 1.5rem;
    padding: 1rem 1.4rem;
    font-size: 1rem;
    font-family: 'Inter', monospace;
    color: #f0f3ff;
    resize: vertical;
    outline: none;
    transition: 0.2s;
    line-height: 1.5;
  }
  textarea:focus {
    border-color: #8f72ff;
    box-shadow: 0 0 20px rgba(143, 114, 255, 0.3);
  }
  textarea::placeholder {
    color: #8a9bcf;
  }

  /* 3D Button Grid */
  .button-galaxy {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin: 1.5rem 0 2rem;
  }
  .action-btn {
    background: rgba(25, 35, 55, 0.8);
    backdrop-filter: blur(8px);
    border: none;
    padding: 12px 28px;
    border-radius: 60px;
    font-weight: 700;
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    color: #f5f9ff;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    border: 0.5px solid rgba(255,255,210,0.25);
  }
  .action-btn i {
    font-size: 1.1rem;
  }
  .action-btn:hover {
    transform: translateY(-4px) scale(1.02);
    background: rgba(55, 75, 120, 0.95);
    box-shadow: 0 14px 26px rgba(0, 0, 0, 0.45);
    border-color: rgba(200, 170, 255, 0.7);
  }
  .speak-btn { background: linear-gradient(105deg, #1f6d49, #0e9f62); box-shadow: 0 5px 12px #0a5a3b70; }
  .analyze-btn { background: linear-gradient(105deg, #7733aa, #9b4dff); box-shadow: 0 5px 14px #5a2a9e50; }

  /* Output Panel 3D depth */
  .output-panel {
    margin-top: 1.2rem;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    border-radius: 1.8rem;
    padding: 1.3rem 1.6rem;
    border: 1px solid rgba(255, 255, 255, 0.15);
    transition: all 0.2s;
  }
  .output-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #b7cbff;
    margin-bottom: 14px;
  }
  #output {
    font-size: 1.05rem;
    line-height: 1.5;
    color: #ffffffec;
    font-weight: 500;
    word-break: break-word;
    min-height: 100px;
    background: transparent;
    font-family: 'Inter', monospace;
    white-space: pre-wrap;
  }

  /* live listening pulse effect */
  .pulse-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: 12px;
  }
  .pulse-dot {
    width: 10px;
    height: 10px;
    background: #2eff9e;
    border-radius: 50%;
    box-shadow: 0 0 8px #3effaa;
    animation: pulseAnim 1.2s infinite;
  }
  @keyframes pulseAnim {
    0% { opacity: 0.4; transform: scale(0.8);}
    100% { opacity: 1; transform: scale(1.3); background: #b5ffd0;}
  }

  /* custom scroll */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #11151f; border-radius: 10px; }
  ::-webkit-scrollbar-thumb { background: #6f5fae; border-radius: 10px; }

  @media (max-width: 600px) {
    .card-content { padding: 1.4rem; }
    .action-btn { padding: 9px 18px; font-size: 0.8rem; }
    h1 { font-size: 1.8rem; }
    textarea { font-size: 0.9rem; }
    #output { font-size: 0.9rem; }
  }
  footer {
    text-align: center;
    font-size: 0.65rem;
    margin-top: 1.8rem;
    opacity: 0.55;
    color: #aab8e6;
  }
</style>
</head>
<body>

<canvas id="cosmic-canvas"></canvas>

<div class="insight-card">
  <div class="card-content">
    <div class="hero-section">
      <h1><i class="fas fa-lightbulb"></i> Insight Listener</h1>
      <p class="tagline"><i class="fas fa-magic"></i> Turn your conversation into startup ideas</p>
    </div>

    <div class="input-zone">
      <div class="input-label">
        <i class="fas fa-comment-dots"></i> 
        <span>💡 Speak or type your conversation</span>
        <span id="voiceIndicator" class="pulse-badge"></span>
      </div>
      <textarea id="inputBox" rows="3" placeholder="E.g., 'People struggle to track daily water intake...' or click 🎙️ Speak"></textarea>
    </div>

    <div class="button-galaxy">
      <button class="action-btn speak-btn" id="speakBtn"><i class="fas fa-microphone-alt"></i> Speak</button>
      <button class="action-btn analyze-btn" id="analyzeBtn"><i class="fas fa-brain"></i> Analyze</button>
    </div>

    <div class="output-panel">
      <div class="output-header">
        <i class="fas fa-rocket"></i> 
        <span>🚀 STARTUP IDEA / INSIGHT</span>
      </div>
      <div id="output">✨ Waiting for input... Speak or type something then click Analyze.</div>
    </div>
    <footer>⚡ 3D Immersive | HuggingFace FLAN-T5 | Real‑time Voice AI</footer>
  </div>
</div>

<script>
  // ---------- 3D ANIMATED BACKGROUND: Cosmic Nebula + Particles ----------
  const canvas = document.getElementById('cosmic-canvas');
  let ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  let timeFlow = 0;

  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }

  class StarParticle {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.z = Math.random() * 200;
      this.radius = 1.5 + Math.random() * 3.5;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.25;
      this.hue = 200 + Math.random() * 100;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < -30) this.x = width + 30;
      if (this.x > width + 30) this.x = -30;
      if (this.y < -30) this.y = height + 30;
      if (this.y > height + 30) this.y = -30;
      this.z += 0.25;
      if (this.z > 240) this.z = 10;
    }
    draw() {
      const perspective = 400 / (400 + this.z);
      const x2 = (this.x - width/2) * perspective + width/2;
      const y2 = (this.y - height/2) * perspective + height/2;
      const r2 = this.radius * perspective;
      ctx.beginPath();
      ctx.arc(x2, y2, r2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, 0.7)`;
      ctx.shadowBlur = 8;
      ctx.shadowColor = `hsla(${this.hue}, 85%, 70%, 0.6)`;
      ctx.fill();
    }
  }

  function initStars(count) {
    particles = [];
    for (let i = 0; i < count; i++) particles.push(new StarParticle());
  }

  function drawCosmicBackground() {
    if (!ctx) return;
    ctx.clearRect(0, 0, width, height);
    // deep gradient
    const grad = ctx.createLinearGradient(0, 0, width*0.7, height);
    grad.addColorStop(0, '#02040c');
    grad.addColorStop(1, '#0b1022');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
    
    // glowing waves / nebula
    ctx.save();
    ctx.shadowBlur = 0;
    for (let i = 0; i < 2; i++) {
      ctx.beginPath();
      const offset = timeFlow * 0.002 + i * 1.2;
      for (let x = 0; x < width; x += 35) {
        let y = height/2 + Math.sin(x * 0.006 + offset) * 45 + Math.cos(x * 0.01 + offset) * 25;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(130, 100, 255, ${0.12 + i*0.06})`;
      ctx.lineWidth = 2.2;
      ctx.stroke();
    }
    ctx.restore();
    
    for (let p of particles) {
      p.update();
      p.draw();
    }
    // floating energy orbs
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      const angle = timeFlow * 0.001 + i;
      const orbX = width/2 + Math.sin(angle) * 130;
      const orbY = height/2 + Math.cos(angle * 0.9) * 80;
      const radGrad = ctx.createRadialGradient(orbX, orbY, 3, orbX, orbY, 38);
      radGrad.addColorStop(0, 'rgba(100, 80, 255, 0.2)');
      radGrad.addColorStop(1, 'rgba(20, 10, 60, 0)');
      ctx.fillStyle = radGrad;
      ctx.arc(orbX, orbY, 40, 0, Math.PI*2);
      ctx.fill();
    }
    timeFlow++;
    requestAnimationFrame(drawCosmicBackground);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    initStars(150);
  });
  resizeCanvas();
  initStars(150);
  drawCosmicBackground();

  // ---------- ORIGINAL LOGIC: Voice + HuggingFace AI (FULLY PRESERVED) ----------
  // Voice recognition setup exactly as original
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  const inputBox = document.getElementById("inputBox");
  const outputDiv = document.getElementById("output");
  const speakBtn = document.getElementById("speakBtn");
  const analyzeBtn = document.getElementById("analyzeBtn");
  const voiceIndicator = document.getElementById("voiceIndicator");

  // track if listening for UI
  let isVoiceActive = false;

  function updateVoiceUI(active) {
    if (active) {
      voiceIndicator.innerHTML = '<span class="pulse-dot"></span><span style="margin-left:6px; font-size:11px;">Listening...</span>';
    } else {
      voiceIndicator.innerHTML = '';
    }
  }

  // 🎤 VOICE INPUT (identical original behaviour)
  function startVoice() {
    try {
      recognition.start();
      isVoiceActive = true;
      updateVoiceUI(true);
    } catch(e) {
      console.log("Already started or error");
    }
  }

  recognition.onstart = function() {
    isVoiceActive = true;
    updateVoiceUI(true);
  };

  recognition.onresult = function(event) {
    // exactly as original: sets inputBox value to transcript
    const transcript = event.results[0][0].transcript;
    inputBox.value = transcript;
    // optional subtle effect
  };

  recognition.onend = function() {
    isVoiceActive = false;
    updateVoiceUI(false);
  };

  recognition.onerror = function(e) {
    console.warn("Speech error:", e.error);
    updateVoiceUI(false);
    isVoiceActive = false;
  };

  // 🧠 AI ANALYSIS: HuggingFace FLAN-T5 (exact original endpoint & logic)
  // IMPORTANT: User must replace "YOUR_API_KEY_HERE" with actual HuggingFace token
  async function analyzeText() {
    const text = inputBox.value.trim();
    
    if (!text) {
      outputDiv.innerText = "⚠️ Please speak or type something first!";
      return;
    }
    
    outputDiv.innerText = "🔮 Analyzing conversation... Generating startup idea ✨";
    
    try {
      // Original API call structure preserved exactly
      const response = await fetch(
        "https://api-inference.huggingface.co/models/google/flan-t5-base",
        {
          method: "POST",
          headers: {
            "Authorization": "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",   // 👈 👈 👈 Replace with your HuggingFace API key
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            inputs: `Generate a startup idea from this conversation: ${text}`
          })
        }
      );
      
      const data = await response.json();
      console.log("HuggingFace response:", data);
      
      if (data.error) {
        outputDiv.innerText = "❌ API Error: " + (data.error || "Invalid request");
        if (data.error.includes("Authorization")) {
          outputDiv.innerText = "🔑 API Key missing or invalid. Please add your HuggingFace token in the code (Bearer YOUR_API_KEY_HERE)";
        }
      } else {
        const resultText = data[0]?.generated_text || "No idea generated. Try rephrasing.";
        outputDiv.innerText = "💡 " + resultText;
      }
    } catch (err) {
      console.error(err);
      outputDiv.innerText = "🌐 Network error: " + err.message + " . Check console & API key.";
    }
  }
  
  // attach events exactly as original onclick bindings
  speakBtn.onclick = startVoice;
  analyzeBtn.onclick = analyzeText;
  
  // Additional micro-interaction: clear placeholder behavior
  inputBox.addEventListener('focus', () => {
    if (inputBox.value === "E.g., 'People struggle to track daily water intake...' or click 🎙️ Speak") {
      inputBox.value = "";
    }
  });
  
  // initial output message
  outputDiv.innerText = "✨ Waiting for input... Speak or type something then click Analyze.";
  
  // small note: The original code had no delete history or copy - keeping pure to the requirement.
  // But we keep exactly the same functionality: voice + analyze.
  // Also ensure if recognition is already active no double start.
  
  // Edge cleanup
  window.addEventListener('beforeunload', () => {
    if (recognition && isVoiceActive) {
      try { recognition.stop(); } catch(e) {}
    }
  });
</script>

<!-- instruction reminder: replace YOUR_API_KEY_HERE with actual HuggingFace token -->
</body>
</html>
