<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice to Text - Fixed</title>
    <style>
        :root { --bg: #111827; --card: #1f2937; --accent: #10b981; --text: #f3f4f6; }
        body { font-family: 'SolaimanLipi', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: var(--accent); margin-bottom: 20px; }
        #display-area { background: #111827; border: 1px solid #374151; border-radius: 10px; padding: 15px; min-height: 200px; max-height: 350px; overflow-y: auto; text-align: left; font-size: 1.2rem; line-height: 1.6; margin-bottom: 20px; }
        .interim { color: #6b7280; font-style: italic; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        #start-btn { background: var(--accent); color: white; }
        #stop-btn { background: #ef4444; color: white; display: none; }
        #clear-btn { background: #4b5563; color: white; }
        button:hover { opacity: 0.8; }
        #status { font-size: 14px; color: #9ca3af; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Voice to Text (Fixed)</h2>
    <div id="status">সিস্টেম রেডি</div>
    <div id="display-area">এখানে কথা বলা শুরু করলে লেখা আসবে...</div>
    <div class="btn-group">
        <button id="start-btn">শুরু করুন</button>
        <button id="stop-btn">থামুন</button>
        <button id="clear-btn">মুছে ফেলুন</button>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const clearBtn = document.getElementById('clear-btn');
    const displayArea = document.getElementById('display-area');
    const statusText = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'bn-BD';

        // আসল ট্রিক: আগের ভেরিয়েবল ছাড়াই ডিরেক্ট ইভেন্ট থেকে ডাটা নেওয়া
        recognition.onresult = (event) => {
            let finalOutput = '';
            let interimOutput = '';

            for (let i = 0; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalOutput += event.results[i][0].transcript;
                } else {
                    interimOutput += event.results[i][0].transcript;
                }
            }

            // এখানে শুধু ফাইনাল আর ইন্টারিম যোগ করে দিলেই রিপিট হবে না
            displayArea.innerHTML = `<span>${finalOutput}</span><span class="interim">${interimOutput}</span>`;
            displayArea.scrollTop = displayArea.scrollHeight;
        };

        recognition.onstart = () => {
            statusText.innerText = "🔴 কথা বলুন, আমি শুনছি...";
            startBtn.style.display = "none";
            stopBtn.style.display = "inline-block";
        };

        recognition.onend = () => {
            if (stopBtn.style.display === "inline-block") {
                recognition.start(); // অটো রিস্টার্ট লজিক
            } else {
                statusText.innerText = "সিস্টেম রেডি";
            }
        };

        startBtn.addEventListener('click', () => {
            if(displayArea.innerText.includes("এখানে কথা বলা")) displayArea.innerText = "";
            recognition.start();
        });

        stopBtn.addEventListener('click', () => {
            stopBtn.style.display = "none";
            startBtn.style.display = "inline-block";
            recognition.stop();
        });

        clearBtn.addEventListener('click', () => {
            displayArea.innerText = "";
            // রিস্টার্ট করার সময় ডাটা ক্লিয়ার করার জন্য স্টপ করে স্টার্ট করা ভালো
            recognition.stop();
        });

    } else {
        alert("Chrome ব্রাউজার ব্যবহার করুন মামা!");
    }
</script>

</body>
</html>
