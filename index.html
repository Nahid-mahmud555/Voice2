<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Insight Listener Pro | Gemini AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 40%, #0a0e1a, #020408);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow-x: hidden;
  }
  #cosmic-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.65;
  }
  .insight-card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 880px;
    background: rgba(12, 18, 32, 0.55);
    backdrop-filter: blur(16px);
    border-radius: 2.8rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
    transition: transform 0.4s ease;
    animation: cardFloat 5s infinite ease-in-out;
  }
  @keyframes cardFloat {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-7px); }
    100% { transform: translateY(0px); }
  }
  .card-content { padding: 2rem 2rem 2.2rem; }
  h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(125deg, #FFFFFF, #B7A9FF, #6E8AFF, #4cff9e);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .tagline { text-align: center; color: #b9cbff; margin-bottom: 1.5rem; }
  .lang-row { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  .lang-pill {
    background: rgba(10, 20, 40, 0.7);
    border-radius: 60px;
    padding: 6px 18px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  select {
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: 1px solid #6d80c0;
    border-radius: 2rem;
    padding: 8px 20px;
    cursor: pointer;
  }
  textarea {
    width: 100%;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 1.5rem;
    padding: 1rem 1.4rem;
    color: white;
    font-family: 'Inter', monospace;
    resize: vertical;
  }
  .button-fleet {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 1.5rem 0;
  }
  .glass-btn {
    background: rgba(25, 35, 55, 0.8);
    border: none;
    padding: 11px 22px;
    border-radius: 60px;
    color: white;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: 0.2s;
  }
  .glass-btn:hover { transform: translateY(-3px); background: rgba(55, 75, 120, 0.95); }
  .start-btn { background: linear-gradient(105deg, #1b6e48, #0e865a); }
  .stop-btn { background: linear-gradient(105deg, #aa3838, #c94444); }
  .analyze-btn { background: linear-gradient(105deg, #7733aa, #9b4dff); }
  .clear-btn { background: linear-gradient(105deg, #c97e2a, #e09d32); }
  .copy-btn { background: linear-gradient(105deg, #1f6090, #2f7eb3); }
  .delete-btn { background: linear-gradient(105deg, #23232e, #1a1a2a); }
  .output-panel {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 1.8rem;
    padding: 1.3rem 1.6rem;
    margin-top: 1rem;
  }
  #output {
    color: white;
    line-height: 1.5;
    min-height: 90px;
  }
  .history-area { margin-top: 1.5rem; }
  #history {
    max-height: 120px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 1.4rem;
    padding: 0.6rem;
  }
  #history p {
    background: rgba(255,255,255,0.07);
    margin: 8px 0;
    padding: 8px 14px;
    border-radius: 34px;
    color: #f0f3ff;
    border-left: 3px solid #8f72ff;
  }
  .listening-badge { display: inline-flex; align-items: center; gap: 6px; margin-left: 12px; }
  .pulse-led {
    width: 10px;
    height: 10px;
    background: #2eff9e;
    border-radius: 50%;
    animation: pulseAnim 1.2s infinite;
  }
  @keyframes pulseAnim {
    0% { opacity: 0.4; transform: scale(0.8);}
    100% { opacity: 1; transform: scale(1.3);}
  }
  footer { text-align: center; font-size: 0.65rem; margin-top: 1.5rem; opacity: 0.55; color: #aab8e6; }
  @media (max-width: 600px) { .card-content { padding: 1.4rem; } .glass-btn { padding: 8px 14px; font-size: 0.75rem; } h1 { font-size: 1.8rem; } }
</style>
</head>
<body>
<canvas id="cosmic-canvas"></canvas>
<div class="insight-card">
  <div class="card-content">
    <h1><i class="fas fa-microphone-alt"></i> Insight Listener Pro</h1>
    <p class="tagline">Voice → AI Startup Ideas (Powered by Gemini)</p>

    <div class="lang-row">
      <div class="lang-pill">
        <label>🌐 ভাষা / Language</label>
        <select id="languageSelect">
          <option value="en-US">English (US)</option>
          <option value="bn-BD">বাংলা (Bangla)</option>
          <option value="hi-IN">हिंदी (Hindi)</option>
        </select>
      </div>
    </div>

    <div class="input-zone">
      <div class="input-label" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <span><i class="fas fa-comment-dots"></i> 🎙️ Speak or type</span>
        <span id="voiceIndicator" class="listening-badge"></span>
      </div>
      <textarea id="inputBox" rows="3" placeholder="Example: 'People struggle to find eco-friendly packaging...'"></textarea>
    </div>

    <div class="button-fleet">
      <button class="glass-btn start-btn" id="startBtn"><i class="fas fa-play"></i> Start</button>
      <button class="glass-btn stop-btn" id="stopBtn"><i class="fas fa-stop"></i> Stop</button>
      <button class="glass-btn analyze-btn" id="analyzeBtn"><i class="fas fa-brain"></i> Analyze</button>
      <button class="glass-btn clear-btn" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
      <button class="glass-btn copy-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
      <button class="glass-btn delete-btn" id="deleteBtn"><i class="fas fa-trash-alt"></i> Delete</button>
    </div>

    <div class="output-panel">
      <div class="output-header"><i class="fas fa-lightbulb"></i> 💡 STARTUP IDEA / AI INSIGHT</div>
      <div id="output">✨ Press Start & speak, then click Analyze to generate ideas...</div>
    </div>

    <div class="history-area">
      <h3 style="color: #cddbff; margin-bottom: 10px;"><i class="fas fa-history"></i> 📝 Voice History</h3>
      <div id="history"></div>
    </div>
    <footer>⚡ 3D Immersive | Google Gemini AI | Continuous Voice | Bangla/English</footer>
  </div>
</div>

<script>
  // 3D Background
  const canvas = document.getElementById('cosmic-canvas');
  let ctx = canvas.getContext('2d');
  let width, height, particles = [], timeFlow = 0;
  function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
  class StarParticle {
    constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.z = Math.random() * 200; this.radius = 1.5 + Math.random() * 3.5; this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.25; this.hue = 200 + Math.random() * 100; }
    update() { this.x += this.vx; this.y += this.vy; if (this.x < -30) this.x = width + 30; if (this.x > width + 30) this.x = -30; if (this.y < -30) this.y = height + 30; if (this.y > height + 30) this.y = -30; this.z += 0.25; if (this.z > 240) this.z = 10; }
    draw() { const perspective = 400 / (400 + this.z); const x2 = (this.x - width/2) * perspective + width/2; const y2 = (this.y - height/2) * perspective + height/2; const r2 = this.radius * perspective; ctx.beginPath(); ctx.arc(x2, y2, r2, 0, Math.PI * 2); ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, 0.7)`; ctx.fill(); }
  }
  function initStars(count) { particles = []; for (let i = 0; i < count; i++) particles.push(new StarParticle()); }
  function drawCosmicBackground() { if (!ctx) return; ctx.clearRect(0, 0, width, height); const grad = ctx.createLinearGradient(0, 0, width*0.7, height); grad.addColorStop(0, '#02040c'); grad.addColorStop(1, '#0b1022'); ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height); for (let p of particles) { p.update(); p.draw(); } timeFlow++; requestAnimationFrame(drawCosmicBackground); }
  window.addEventListener('resize', () => { resizeCanvas(); initStars(150); });
  resizeCanvas(); initStars(150); drawCosmicBackground();

  // Voice Recognition
  let recognition, finalText = "", lastText = "", isListening = false;
  const inputBox = document.getElementById("inputBox"), outputDiv = document.getElementById("output");
  const historyDiv = document.getElementById("history"), languageSelect = document.getElementById("languageSelect");
  const voiceIndicator = document.getElementById("voiceIndicator");

  function updateListeningUI(active) { voiceIndicator.innerHTML = active ? '<span class="pulse-led"></span><span>Listening...</span>' : ''; }
  function saveHistory() { const text = inputBox.value.trim(); if (!text) return; const p = document.createElement("p"); p.innerText = "• " + text; historyDiv.prepend(p); while (historyDiv.children.length > 15) historyDiv.removeChild(historyDiv.lastChild); }

  function startListening() {
    if (isListening) return;
    finalText = ""; lastText = "";
    const lang = languageSelect.value;
    try {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = lang;
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.start();
      isListening = true;
      updateListeningUI(true);
      recognition.onresult = function(event) {
        let currentText = "";
        for (let i = event.resultIndex; i < event.results.length; i++) currentText += event.results[i][0].transcript;
        if (currentText !== lastText) { let newPart = currentText.replace(lastText, ""); finalText += newPart + " "; lastText = currentText; }
        inputBox.value = finalText;
      };
      recognition.onend = function() { if (isListening) { try { recognition.start(); } catch(e) {} } else { updateListeningUI(false); } };
      recognition.onerror = function(e) { if (e.error === 'not-allowed') { inputBox.value = "Microphone access denied."; stopListening(); } };
    } catch(e) { inputBox.value = "Browser not supported."; }
  }

  function stopListening() {
    isListening = false;
    if (recognition) try { recognition.stop(); } catch(e) {}
    if (inputBox.value.trim()) saveHistory();
    lastText = ""; updateListeningUI(false);
  }

  // 🔥 Gemini API (CORS friendly, free)
  const GEMINI_API_KEY = "AIzaSyDPbB8UDbn9bSTatAFIRUEwAiMQjiuqKUU";  // 👈 এখানে আপনার Gemini API key বসান
  
  async function analyzeText() {
    const text = inputBox.value.trim();
    if (!text) { outputDiv.innerText = "⚠️ Please speak or type something first!"; return; }
    outputDiv.innerText = "🧠 Analyzing... Generating startup idea ✨";
    
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Generate a creative startup/business idea from this conversation: ${text}. Give a short, actionable idea.` }] }]
        })
      });
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No idea generated.";
      outputDiv.innerText = "💡 " + aiText;
    } catch(err) {
      console.error(err);
      outputDiv.innerText = "❌ Error: " + err.message + "। দয়া করে Gemini API key সেট করুন।";
    }
  }

  function clearText() { finalText = ""; lastText = ""; inputBox.value = ""; }
  function copyText() { navigator.clipboard.writeText(inputBox.value); alert("Copied!"); }
  function deleteHistory() { historyDiv.innerHTML = ""; }

  languageSelect.addEventListener('change', () => { if (isListening) { stopListening(); setTimeout(startListening, 200); } });
  document.getElementById("startBtn").onclick = startListening;
  document.getElementById("stopBtn").onclick = stopListening;
  document.getElementById("analyzeBtn").onclick = analyzeText;
  document.getElementById("clearBtn").onclick = clearText;
  document.getElementById("copyBtn").onclick = copyText;
  document.getElementById("deleteBtn").onclick = deleteHistory;
</script>
</body>
</html>
