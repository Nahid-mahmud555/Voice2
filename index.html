<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ভয়েস টু টেক্সট AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #eef2f3; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        #output { border: 2px dashed #bbb; padding: 15px; min-height: 80px; margin: 20px 0; border-radius: 10px; background: #fff; color: #333; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #218838; }
        .status { font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h2>ভয়েস টাইপিং</h2>
    <p class="status" id="status">নিচের বাটনে ক্লিক করে কথা বলুন...</p>
    <div id="output">আপনার কথা এখানে দেখা যাবে...</div>
    <button id="start-btn">কথা বলা শুরু করুন</button>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    // ব্রাউজার সাপোর্ট চেক
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        
        // বাংলা ইনপুট নেওয়ার জন্য 'bn-BD' সেট করা হয়েছে
        recognition.lang = 'bn-BD'; 
        recognition.interimResults = false;

        recognition.onstart = () => {
            status.innerText = "আমি শুনছি... কথা বলুন।";
            startBtn.style.background = "#dc3545";
            startBtn.innerText = "রেকর্ডিং হচ্ছে...";
        };

        recognition.onspeechend = () => {
            recognition.stop();
            status.innerText = "প্রসেসিং হচ্ছে...";
            startBtn.style.background = "#28a745";
            startBtn.innerText = "আবার শুরু করুন";
        };

        recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript;
            output.innerText = resultText;
            status.innerText = "সফলভাবে লেখা হয়েছে!";
        };

        recognition.onerror = (event) => {
            status.innerText = "ভুল হয়েছে: " + event.error;
        };

        startBtn.addEventListener('click', () => {
            recognition.start();
        });

    } else {
        alert("দুঃখিত, আপনার ব্রাউজারে এই ফিচারটি সাপোর্ট করছে না। গুগল ক্রোম ব্যবহার করুন।");
    }
</script>

</body>
</html>
